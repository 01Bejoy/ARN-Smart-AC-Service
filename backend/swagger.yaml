openapi: 3.0.0

info:
  title: ARN Smart AC Service API
  version: 1.0.0
  description: REST API Documentation

servers:
  - url: http://localhost:5000/api

paths:
  /auth/register:
    post:
      summary: Register User
      responses:
        "201":
          description: User registered successfully

  /auth/login:
    post:
      summary: Login User
      responses:
        "200":
          description: Login successful

  /bookings:
    post:
      summary: Create Booking
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Booking created successfully

    get:
      summary: Get All Bookings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Booking list

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT